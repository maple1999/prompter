<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'unsafe-inline'; script-src 'self'; img-src data:">
  <title>选择截图区域</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; cursor: crosshair; background: #000; }
    #canvas { display: block; width: 100vw; height: 100vh; }
    #hint {
      position: fixed; top: 24px; left: 50%; transform: translateX(-50%);
      padding: 8px 18px; border-radius: 999px;
      background: rgba(0, 0, 0, 0.72); color: rgba(255, 255, 255, 0.92);
      font: 13px/1.4 'Segoe UI', 'Microsoft YaHei', sans-serif;
      pointer-events: none; user-select: none;
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <div id="hint">拖动选择题目区域 · ESC 取消</div>
  <script src="region.js"></script>
</body>
</html>
