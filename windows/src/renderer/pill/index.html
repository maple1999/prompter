<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self'; script-src 'self'">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OpenTeleprompter</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="pill" data-state="compact">

    <!-- Compact state -->
    <div class="pill-section pill-compact">
      <span class="mode-dot"></span>
      <span class="mode-icon"></span>
      <span class="mode-label"></span>
    </div>

    <!-- Listening state -->
    <div class="pill-section pill-listening">
      <div class="waveform">
        <span class="wave-bar"></span>
        <span class="wave-bar"></span>
        <span class="wave-bar"></span>
      </div>
      <span class="listening-label">听题中…</span>
      <span class="listening-sep"></span>
      <span class="listening-text"></span>
    </div>

    <!-- Thinking state -->
    <div class="pill-section pill-thinking">
      <div class="thinking-dots">
        <span class="dot"></span>
        <span class="dot"></span>
        <span class="dot"></span>
      </div>
      <span class="thinking-label">思考中…</span>
    </div>

    <!-- Teleprompter state -->
    <div class="pill-section pill-teleprompter">
      <div class="teleprompter-tokens"></div>
    </div>

    <!-- Quiz answer state -->
    <div class="pill-section pill-quiz">
      <span class="quiz-kind"></span>
      <div class="quiz-main">
        <div class="quiz-answer"></div>
        <div class="quiz-reasoning"></div>
      </div>
    </div>

    <!-- Error state -->
    <div class="pill-section pill-error">
      <span class="error-icon">⚠</span>
      <span class="error-message"></span>
    </div>

  </div>

  <script src="renderer.js"></script>
</body>
</html>
